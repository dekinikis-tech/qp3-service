name: VPN Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update_gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # --- ИСПРАВЛЕННЫЙ БЛОК: ИСПОЛЬЗУЕМ JQ ДЛЯ НАДЕЖНОСТИ ---
      - name: Install Xray
        run: |
          # 1. Используем jq для надежного извлечения URL из ответа GitHub API
          LATEST_URL=$(curl -s "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | jq -r '.assets[] | select(.name == "Xray-linux-64.zip") | .browser_download_url')
          
          # 2. Скачиваем архив
          echo "Downloading Xray from: $LATEST_URL"
          wget -O xray.zip "$LATEST_URL"
          
          # 3. Распаковываем исполняемый файл xray
          unzip -o xray.zip xray
          
          # 4. Перемещаем в системную директорию и делаем исполняемым
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          
          # 5. Проверяем версию
          echo "Xray installed successfully:"
          xray version

      - name: Install Python dependencies
        run: pip install "requests[socks]"

      - name: Run main script to check proxies and update Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
        run: python main.py
