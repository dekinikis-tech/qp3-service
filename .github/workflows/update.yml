name: VPN Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update_gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Xray
        run: |
          LATEST_URL=$(curl -s "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | grep "browser_download_url" | grep "linux-64.zip\"" | cut -d '"' -f 4)
          echo "Downloading Xray from: $LATEST_URL"
          wget -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          echo "Xray installed successfully:"
          xray version

      # --- ИСПРАВЛЕННЫЙ БЛОК ---
      - name: Install Python dependencies
        run: pip install "requests[socks]"

      - name: Run main script to check proxies and update Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
        run: python main.py
