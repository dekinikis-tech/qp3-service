name: VPN Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Новый запуск автоматически отменяет предыдущий
concurrency:
  group: vpn-update
  cancel-in-progress: true

jobs:
  update_gist:
    runs-on: ubuntu-latest
    # Жёсткий лимит: если за 25 минут не уложились — убиваем
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Xray
        run: |
          LATEST_URL=$(curl -s "https://api.github.com/repos/XTLS/Xray-core/releases/latest" \
            | jq -r '.assets[] | select(.name == "Xray-linux-64.zip") | .browser_download_url')
          echo "Downloading Xray from: $LATEST_URL"
          wget -q -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          xray version

      - name: Install Python dependencies
        run: pip install "requests[socks]"

      - name: Run checker
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
        run: python main.py
