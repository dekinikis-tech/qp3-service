name: VPN Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update_gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Xray
        run: |
          # Используем ссылку на конкретную версию, чтобы не было редиректов на HTML
          wget -O xray.zip https://github.com
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          xray version

      - name: Install Python dependencies
        run: pip install requests

      - name: Run main script
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
        run: python main.py
