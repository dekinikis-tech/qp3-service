name: VPN Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Новый запуск автоматически отменяет предыдущий
concurrency:
  group: vpn-update
  cancel-in-progress: true

jobs:
  update_gist:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Xray
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/XTLS/Xray-core/releases/latest")

          if echo "$API_RESPONSE" | jq -e '.assets' > /dev/null 2>&1; then
            LATEST_URL=$(echo "$API_RESPONSE" \
              | jq -r '.assets[] | select(.name == "Xray-linux-64.zip") | .browser_download_url')
          else
            echo "GitHub API error:"
            echo "$API_RESPONSE" | jq '.' || echo "$API_RESPONSE"
            exit 1
          fi

          echo "Downloading Xray from: $LATEST_URL"
          wget -q -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          xray version

      - name: Install Python dependencies
        run: pip install "requests[socks]" geoip2

      - name: Download GeoLite2 database
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          if [ -z "$MAXMIND_LICENSE_KEY" ]; then
            echo "MAXMIND_LICENSE_KEY не задан — GeoIP будет недоступен, используем fallback"
          else
            wget -q -O GeoLite2-Country.tar.gz \
              "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz"
            tar -xzf GeoLite2-Country.tar.gz --wildcards --no-anchored '*.mmdb' --strip-components=1
            echo "GeoLite2-Country.mmdb скачан: $(du -sh GeoLite2-Country.mmdb)"
          fi

      - name: Run checker
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
          GEOIP_DB: GeoLite2-Country.mmdb
        run: python main.py
